<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영업관리 시스템 - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Malgun Gothic', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo .icon-wrap {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #1a237e, #1565c0);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }
        .login-logo .icon-wrap i { font-size: 32px; color: white; }
        .login-logo h4 { color: #1a237e; font-weight: 700; font-size: 1.4rem; margin: 0; }
        .login-logo p { color: #6c757d; font-size: 0.9rem; margin: 4px 0 0; }
        .form-label { font-weight: 600; color: #374151; font-size: 0.9rem; }
        .form-control {
            border-radius: 8px; border: 1.5px solid #d1d5db;
            padding: 10px 14px; font-size: 0.95rem;
        }
        .form-control:focus { border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,0.15); }
        .input-group-text {
            border-radius: 8px 0 0 8px; border: 1.5px solid #d1d5db;
            background: #f9fafb; color: #6c757d;
        }
        .input-group .form-control { border-radius: 0 8px 8px 0; }
        .btn-login {
            background: linear-gradient(135deg, #1a237e, #1565c0);
            border: none; border-radius: 8px; padding: 12px;
            font-size: 1rem; font-weight: 600; letter-spacing: 0.5px;
        }
        .btn-login:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div class="icon-wrap"><i class="bi bi-briefcase-fill"></i></div>
        <h4>영업관리 시스템</h4>
        <p>Sales Management System</p>
    </div>
    <div id="errorAlert" class="alert alert-danger d-none">
        <i class="bi bi-exclamation-circle me-2"></i><span id="errorMsg"></span>
    </div>
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">아이디</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="username"
                       placeholder="아이디를 입력하세요" required autocomplete="username">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">비밀번호</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password"
                       placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            </div>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
            <i class="bi bi-box-arrow-in-right me-2"></i>로그인
        </button>
    </form>
</div>
<script>
const BASE = '{{ base_path }}';
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alertEl = document.getElementById('errorAlert');
    const msgEl   = document.getElementById('errorMsg');
    alertEl.classList.add('d-none');
    try {
        const res  = await fetch(BASE + '/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = BASE + '/';
        } else {
            msgEl.textContent = data.message || '로그인 실패';
            alertEl.classList.remove('d-none');
        }
    } catch (err) {
        msgEl.textContent = '서버 연결 실패';
        alertEl.classList.remove('d-none');
    }
});
document.getElementById('username').focus();
</script>
</body>
</html>
